name: Stale Assignment Cleanup

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Unassign stale issues (48h deadline)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Fetch all open issues that have assignees
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo,
              state: 'open',
              per_page: 100
            });
            
            const now = Date.now();
            const DEADLINE_MS = 48 * 60 * 60 * 1000; // 48 hours
            
            for (const issue of issues) {
              // Skip pull requests (they also appear in the issues API)
              if (issue.pull_request) continue;
              
              // Skip issues with no assignees
              if (!issue.assignees || issue.assignees.length === 0) continue;
              
              // Check if there's a linked PR from the assignee already
              const timeline = await github.rest.issues.listEventsForTimeline({
                owner, repo,
                issue_number: issue.number,
                per_page: 100
              });
              
              // Find the most recent assignment event
              const assignEvents = timeline.data.filter(e => e.event === 'assigned');
              if (assignEvents.length === 0) continue;
              
              const lastAssign = assignEvents[assignEvents.length - 1];
              const assignedAt = new Date(lastAssign.created_at).getTime();
              const elapsed = now - assignedAt;
              
              if (elapsed > DEADLINE_MS) {
                const assignee = issue.assignees[0].login;
                
                // Check if a PR mentioning this issue exists from the assignee
                const prSearch = await github.rest.search.issuesAndPullRequests({
                  q: `repo:${owner}/${repo} is:pr author:${assignee} ${issue.number}`,
                  per_page: 5
                });
                
                // If the assignee already has a PR open/merged, skip
                if (prSearch.data.total_count > 0) {
                  console.log(`Issue #${issue.number}: Assignee @${assignee} has a linked PR. Skipping.`);
                  continue;
                }
                
                console.log(`Issue #${issue.number}: 48h deadline exceeded for @${assignee}. Unassigning...`);
                
                // Unlock if locked so we can post the comment
                if (issue.locked) {
                  await github.rest.issues.unlock({ owner, repo, issue_number: issue.number });
                }
                
                // Unassign the user
                await github.rest.issues.removeAssignees({
                  owner, repo,
                  issue_number: issue.number,
                  assignees: [assignee]
                });
                
                // Post a comment explaining
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: issue.number,
                  body: `⏰ **Deadline Expired** — @${assignee} was unassigned from this issue because no Pull Request was submitted within the 48-hour window.\n\nThis issue is now **open for other contributors**! If you'd like to work on it, comment \`assign me\` below. 🚀`
                });
              }
            }
            
            console.log("Stale assignment cleanup complete.");
